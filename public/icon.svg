<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldFav" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8D5A3"/>
      <stop offset="50%" stop-color="#C9A96E"/>
      <stop offset="100%" stop-color="#B8863F"/>
    </linearGradient>
    <style>
      @media (prefers-color-scheme: light) {
        .bg { fill: #1a1a1a; }
      }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #f5f3ef; }
      }
    </style>
  </defs>

  <!-- Background rounded square -->
  <rect class="bg" width="180" height="180" rx="36" fill="#1a1a1a"/>

  <!-- Outer diamond frame -->
  <polygon
    points="90,22 158,90 90,158 22,90"
    fill="none"
    stroke="url(#goldFav)"
    stroke-width="1.5"
  />
  <!-- Inner diamond -->
  <polygon
    points="90,32 148,90 90,148 32,90"
    fill="none"
    stroke="url(#goldFav)"
    stroke-width="0.7"
    opacity="0.5"
  />

  <!-- Letter V centered -->
  <text
    x="90"
    y="108"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="72"
    font-weight="400"
    fill="url(#goldFav)"
  >V</text>
</svg>
